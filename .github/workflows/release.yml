name: Build Windows
on:
  push:
    branches: [main]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
        shell: pwsh
      - name: Install Tesseract and Leptonica via vcpkg
        run: |
          C:\vcpkg\vcpkg.exe install tesseract:x64-windows-static-md
          C:\vcpkg\vcpkg.exe install leptonica:x64-windows-static-md
          C:\vcpkg\vcpkg.exe integrate install
        shell: pwsh
      - name: Set vcpkg environment variables
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" >> $env:GITHUB_ENV
        shell: pwsh
      - run: npm install
      - run: npm run tauri build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: agrade-windows
          path: src-tauri/target/release/bundle/**/*
