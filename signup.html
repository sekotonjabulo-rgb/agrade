<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agrade signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #08080a;
      --white: #f4f3f0;
      --muted: rgba(244, 243, 240, 0.38);
      --surface: rgba(244, 243, 240, 0.04);
      --border: rgba(244, 243, 240, 0.07);
      --border-strong: rgba(244, 243, 240, 0.14);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      transition: background 0.3s;
    }

    nav.scrolled {
      background: rgba(8, 8, 10, 0.9);
      backdrop-filter: blur(20px);
    }

    .nav-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.4rem;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-link {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--white); }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .auth-title {
      font-family: 'Instrument Serif', serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .form-input {
      background: var(--surface);
      border: none;
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--white);
      outline: none;
      width: 100%;
      transition: background 0.2s;
    }

    .form-input::placeholder { color: rgba(244,243,240,0.14); }
    .form-input:focus { background: rgba(244,243,240,0.07); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--white);
      color: var(--black);
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-submit:hover { opacity: 0.85; transform: scale(1.01); }

    .auth-terms {
      margin-top: 14px;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(244,243,240,0.2);
      font-family: 'DM Mono', monospace;
      line-height: 1.6;
    }

    .auth-switch {
      margin-top: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
    }

    .auth-switch a {
      color: var(--white);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .auth-switch a:hover { opacity: 0.7; }

    footer {
      position: relative;
      z-index: 1;
      padding: 24px 48px;
      display: flex;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.1rem;
      color: var(--white);
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="auth-wrap">
      <p class="auth-title">Create account</p>
      <p class="auth-subtitle">Start your agrade subscription today</p>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" />
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" class="form-input" />
      </div>
      <button class="btn-submit">Create account</button>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>


  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
    });
  </script>
</body>
</html>
